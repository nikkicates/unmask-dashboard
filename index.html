<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Transformations | Portal</title>
    
    <!-- Fonts: Lora & Urbanist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat SDKs (Essential for single-file HTML to avoid 'require' errors) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #070e24; font-family: 'Urbanist', sans-serif; margin: 0; overflow-x: hidden; }
        .font-lora { font-family: 'Lora', serif; }
        .font-urbanist { font-family: 'Urbanist', sans-serif; }
        
        /* Hexagon Clip Paths */
        .hex { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #070e24; }
        ::-webkit-scrollbar-thumb { background: #163d8d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1e4eb0; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .bg-[#064680], .bg-[#04325c] { background: #f8fafc !important; border: 1px solid #ddd !important; }
            .text-teal-400 { color: #0d9488 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURATION (PASTE YOUR API KEY HERE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBG4228evDP211fvJv1LMSt0AZ8a8kj31c", 
            authDomain: "unmask-audit-2026.firebaseapp.com",
            projectId: "unmask-audit-2026",
            storageBucket: "unmask-audit-2026.firebasestorage.app",
            messagingSenderId: "94518937589",
            appId: "1:94518937589:web:a484d36bf7a11ffe9a82bc"
        };

        // Initialize Firebase using Global Compat Object
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // Built-in Icons to avoid external 'require' calls
        const Icons = {
            Layers: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
            ShieldCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 11 11 13 15 9"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 22 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Loader: () => <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [auditData, setAuditData] = useState(null);
            const [error, setError] = useState(null);
            const [inputValue, setInputValue] = useState('');
            const [auditId, setAuditId] = useState(new URLSearchParams(window.location.search).get('id'));

            useEffect(() => {
                const initAuth = async () => {
                    auth.onAuthStateChanged(async (user) => {
                        if (!user) {
                            try { await auth.signInAnonymously(); } catch (e) { console.error("Auth failed"); }
                        }
                        if (auditId) {
                            const docPath = `artifacts/unmask-audit-2026/public/data/structural_audits/${auditId}`;
                            const unsubscribe = db.doc(docPath).onSnapshot((snap) => {
                                if (snap.exists) {
                                    setAuditData(snap.data());
                                    setError(null);
                                } else {
                                    setError(`ID_NOT_RECOGNIZED: "${auditId}" is not in the diagnostic database.`);
                                }
                                setLoading(false);
                            }, (err) => {
                                setError(`ACCESS_DENIED: Check Firestore rules.`);
                                setLoading(false);
                            });
                            return () => unsubscribe();
                        } else {
                            setLoading(false);
                        }
                    });
                };
                initAuth();
            }, [auditId]);

            const handleAuthenticate = () => {
                if (inputValue.trim()) {
                    const id = inputValue.trim().toUpperCase();
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('id', id);
                    window.history.pushState({}, '', newUrl);
                    setAuditId(id);
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#070e24] flex items-center justify-center text-teal-400">
                    <Icons.Loader />
                </div>
            );

            if (error) return (
                <div className="min-h-screen bg-[#070e24] flex items-center justify-center p-6 text-white font-urbanist text-center">
                    <div className="max-w-xl w-full bg-[#161d31] border border-red-400/20 rounded-[2.5rem] p-12 shadow-2xl">
                        <div className="flex justify-center text-red-400 mb-6"><Icons.AlertTriangle /></div>
                        <h2 className="text-2xl font-lora italic mb-4">System Access Alert</h2>
                        <div className="bg-black/20 p-4 rounded-xl mb-8 font-mono text-red-300 text-[10px] break-all border border-red-900/30 leading-relaxed">{error}</div>
                        <button onClick={() => { setAuditId(null); setError(null); }} className="text-teal-400 font-black uppercase text-[10px] tracking-widest hover:text-white transition-colors">Return to Entrance</button>
                    </div>
                </div>
            );

            if (!auditId) return (
                <div className="min-h-screen bg-[#070e24] flex flex-col items-center justify-center p-6 text-center font-urbanist">
                    <div className="mb-16 relative flex justify-center scale-[1.35]">
                        <div className="grid grid-cols-2 gap-1.5">
                            <div className="w-5 h-5 bg-teal-500 hex" />
                            <div className="w-5 h-5 border-2 border-slate-500 hex translate-y-3.5 -translate-x-1" />
                            <div className="w-5 h-5 bg-purple-600 hex -translate-y-2.5" />
                        </div>
                    </div>
                    <div className="max-w-xl w-full mb-16 px-4">
                        <h2 className="text-4xl lg:text-5xl font-lora text-white mb-6 italic">Secure Diagnostic Access</h2>
                        <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em]">Strategic Transformations Portal</p>
                    </div>
                    <div className="max-w-md w-full space-y-5">
                        <input 
                            type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)}
                            placeholder="......" 
                            className="w-full bg-[#161d31] border border-white/5 rounded-2xl px-6 py-8 text-white text-center text-2xl font-mono focus:border-blue-500/50 outline-none placeholder:text-slate-800 transition-all shadow-xl"
                            onKeyDown={(e) => { if (e.key === 'Enter') handleAuthenticate(); }}
                        />
                        <button onClick={handleAuthenticate} className="w-full bg-[#163d8d] hover:bg-[#1e4eb0] text-white font-black py-6 rounded-2xl shadow-xl uppercase tracking-widest text-sm transition-all flex items-center justify-center gap-2 active:scale-95">
                            Authenticate Session
                        </button>
                    </div>
                    <footer className="mt-24 text-[10px] text-slate-700 uppercase tracking-[0.2em] opacity-60 leading-relaxed max-w-xs mx-auto">
                        This diagnostic engine is proprietary IP. <br/> Unauthorized access is prohibited.
                    </footer>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#064680] text-white font-urbanist flex flex-col overflow-x-hidden">
                    <header className="border-b border-white/10 bg-[#04325c]/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
                            <div className="flex items-center gap-4 sm:gap-6">
                                <div className="h-10 w-10 flex items-center justify-center bg-white rounded-lg shadow-md shrink-0">
                                    <div className="grid grid-cols-2 gap-1 scale-75">
                                        <div className="w-3 h-3 bg-[#064680] rounded-sm" />
                                        <div className="w-3 h-3 bg-teal-500 rounded-sm" />
                                        <div className="w-3 h-3 bg-purple-600 rounded-sm" />
                                        <div className="w-3 h-3 bg-[#064680] rounded-sm" />
                                    </div>
                                </div>
                                <div>
                                    <h1 className="text-lg sm:text-xl font-lora font-bold text-white tracking-tighter uppercase whitespace-nowrap">
                                        UNMASK <span className="text-teal-400 italic font-light lowercase text-base sm:text-lg">Diagnostic</span>
                                    </h1>
                                    <p className="text-[8px] sm:text-[9px] text-white/40 font-black uppercase tracking-[0.4em] mt-1 sm:mt-2 italic">Ref: {auditId}</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-2 bg-teal-500/10 px-4 py-2 rounded-full border border-teal-500/20">
                                <div className="h-1.5 w-1.5 rounded-full bg-teal-400 animate-pulse" />
                                <span className="text-[9px] font-black uppercase tracking-widest text-teal-400">Live Stream</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto px-6 py-12 lg:py-20 w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 lg:gap-24">
                            <div className="lg:col-span-7 space-y-12 sm:space-y-20">
                                {[
                                    { key: "authorityAlignment", label: "Authority Alignment", sub: "Responsibility vs Power Gap" },
                                    { key: "operationalSqueeze", label: "Operational Squeeze", sub: "Load vs Structural Capacity" },
                                    { key: "maskingDensity", label: "Masking Density", sub: "Energy spent on performance theater" },
                                    { key: "escalationDensity", label: "Escalation Density", sub: "Decision path friction" }
                                ].map((f) => (
                                    <div key={f.key} className="group">
                                        <div className="flex justify-between items-end mb-4 sm:mb-6">
                                            <div>
                                                <h3 className="text-base sm:text-xl font-urbanist font-black uppercase tracking-widest text-white/90 leading-none mb-2">{f.label}</h3>
                                                <p className="text-[10px] sm:text-[11px] font-lora italic text-white/40">{f.sub}</p>
                                            </div>
                                            <div className="text-3xl sm:text-5xl font-urbanist font-black text-teal-400 tracking-tighter leading-none">
                                                {(auditData?.[f.key] || 0).toFixed(1)}
                                            </div>
                                        </div>
                                        <div className="h-3 bg-black/20 rounded-full border border-white/5 overflow-hidden p-[2px]">
                                            <div className="h-full bg-gradient-to-r from-teal-600 via-teal-400 to-cyan-400 rounded-full transition-all duration-[2000ms] ease-out shadow-[0_0_15px_rgba(45,212,191,0.3)]"
                                                style={{ width: `${Math.min(((auditData?.[f.key] || 0) / 5) * 100, 100)}%` }}
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="lg:col-span-5 space-y-10">
                                <div className="bg-[#04325c] p-10 sm:p-14 rounded-[3.5rem] border border-white/10 shadow-2xl text-center relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-10 opacity-[0.03] group-hover:opacity-[0.08] transition-all duration-700">
                                        <Icons.Layers />
                                    </div>
                                    <h2 className="text-xl font-lora italic text-white/60 mb-10 uppercase tracking-widest relative z-10">Aggregate Strain</h2>
                                    <div className="text-8xl lg:text-9xl font-urbanist font-black text-teal-400 tracking-tighter leading-none mb-8 relative z-10 drop-shadow-[0_4px_25px_rgba(45,212,191,0.3)]">
                                        {(auditData?.totalStrainScore || 0).toFixed(2)}
                                    </div>
                                    <p className="text-[11px] text-white/30 uppercase font-black tracking-[0.4em] relative z-10">Structural Health Score</p>
                                    <div className="mt-12 flex justify-center text-teal-500/20 relative z-10 animate-pulse"><Icons.Activity /></div>
                                </div>
                                
                                <div className="bg-white/5 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/5 italic font-lora text-white/70 text-xl leading-relaxed shadow-lg text-center lg:text-left">
                                    {(auditData?.totalStrainScore || 0) > 3.5 ? 
                                        "Structural integrity is compromised. Recalibration of leadership load-paths is required to sustain output." : 
                                        "The organization demonstrates high structural maturity with low friction in decision velocity."}
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="bg-white/5 border-t border-white/10 py-24 px-6 text-center mt-12 no-print">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-4xl font-lora italic text-white mb-6">Ready to Recalibrate?</h2>
                            <p className="text-white/40 font-urbanist font-light mb-12 text-lg">Shift from managing symptoms to redesigning systems.</p>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                                <a href="https://strategictransformations.com/book" className="group bg-white text-[#064680] px-12 py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-teal-400 transition-all shadow-2xl flex items-center gap-3">
                                    <div className="group-hover:animate-bounce"><Icons.Calendar /></div>
                                    Book Discovery <span className="hidden sm:inline text-xs opacity-50 font-light lowercase">with Nikki Cates</span>
                                </a>
                                <button onClick={() => window.print()} className="text-white/30 hover:text-white font-black uppercase tracking-widest text-[10px] transition-all flex items-center gap-2">
                                    <Icons.FileText /> EXPORT SYSTEM AUDIT (PDF)
                                </button>
                            </div>
                        </div>
                        <p className="mt-24 text-[10px] text-white/5 font-black tracking-[1em] uppercase">
                            © 2026 STRATEGIC TRANSFORMATIONS
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
