<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Transformations | Portal</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- Styling CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #070e24; font-family: 'Urbanist', sans-serif; margin: 0; overflow-x: hidden; color: white; }
        .font-lora { font-family: 'Lora', serif; }
        .hex { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Interactive Slider Styling */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 10px; border-radius: 99px; background: rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #2dd4bf; margin-top: -5px; box-shadow: 0 0 10px rgba(45, 212, 191, 0.5); border: 2px solid white; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBG4228evDP211fvJv1LMSt0AZ8a8kj31c", 
            authDomain: "unmask-audit-2026.firebaseapp.com",
            projectId: "unmask-audit-2026",
            storageBucket: "unmask-audit-2026.firebasestorage.app",
            messagingSenderId: "94518937589",
            appId: "1:94518937589:web:a484d36bf7a11ffe9a82bc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const BrandLogo = ({ size = "md" }) => {
            const containerClass = size === "lg" ? "scale-[1.6] mb-24" : "scale-75";
            const hexSize = "w-6 h-6";
            return (
                <div className={`relative flex items-center justify-center ${containerClass}`}>
                    <div className="relative w-12 h-12">
                        <div className={`${hexSize} bg-teal-400 hex absolute top-0 left-1/2 -translate-x-1/2 z-20 shadow-[0_0_15px_rgba(45,212,191,0.5)]`} />
                        <div className={`${hexSize} bg-purple-600 hex absolute top-4 left-0 z-10`} />
                        <div className={`${hexSize} bg-slate-400 hex absolute top-4 right-0 flex items-center justify-center p-[2px] z-10`}>
                            <div className="w-full h-full bg-[#070e24] hex" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [auditData, setAuditData] = useState({
                authorityAlignment: 2.5,
                operationalSqueeze: 3.0,
                maskingDensity: 4.0,
                escalationDensity: 3.5,
                totalStrainScore: 3.25,
                loadPathEfficiency: 68
            });
            const [error, setError] = useState(null);
            const [inputValue, setInputValue] = useState('');
            const [isInteractiveMode, setIsInteractiveMode] = useState(false);
            const [auditId, setAuditId] = useState(new URLSearchParams(window.location.search).get('id'));

            useEffect(() => {
                const init = async () => {
                    auth.onAuthStateChanged(async (user) => {
                        if (!user) await auth.signInAnonymously().catch(console.error);
                        
                        if (auditId) {
                            const cleanId = auditId.trim().toUpperCase();
                            
                            if (cleanId === 'UNMASK2026') {
                                setIsInteractiveMode(true);
                                setLoading(false);
                                return;
                            }

                            setIsInteractiveMode(false);
                            const path = `artifacts/unmask-audit-2026/public/data/structural_audits/${cleanId}`;
                            
                            db.doc(path).onSnapshot((snap) => {
                                if (snap.exists) {
                                    setAuditData(snap.data());
                                    setError(null);
                                } else {
                                    setError(`ID_NOT_FOUND: Access code "${cleanId}" not recognized.`);
                                }
                                setLoading(false);
                            }, (err) => { 
                                setError(`ACCESS_DENIED: Database connection interrupted.`); 
                                setLoading(false); 
                            });
                        } else {
                            setLoading(false);
                        }
                    });
                };
                init();
            }, [auditId]);

            const updateField = (key, val) => {
                if (!isInteractiveMode) return;
                const newData = { ...auditData, [key]: parseFloat(val) };
                newData.totalStrainScore = (newData.authorityAlignment + newData.operationalSqueeze + newData.maskingDensity + newData.escalationDensity) / 4;
                setAuditData(newData);
            };

            const handleGo = () => { if (inputValue.trim()) window.location.search = `?id=${inputValue.trim().toUpperCase()}`; };

            if (loading) return (
                <div className="min-h-screen bg-[#070e24] flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-t-teal-500 rounded-full animate-spin" />
                </div>
            );

            if (!auditId || error) return (
                <div className="min-h-screen bg-[#070e24] flex flex-col items-center justify-center p-8 text-center font-urbanist">
                    <BrandLogo size="lg" />
                    <h2 className="text-4xl lg:text-5xl font-lora text-white mb-6 italic tracking-tight font-medium">Secure Diagnostic Access</h2>
                    <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mb-16">Strategic Transformations Portal</p>
                    <div className="max-w-md w-full space-y-6">
                        <input 
                            type="text" 
                            value={inputValue} 
                            onChange={(e) => setInputValue(e.target.value)} 
                            placeholder="......" 
                            className="w-full bg-slate-900/40 border border-white/5 rounded-2xl px-6 py-8 text-white text-center text-2xl font-mono focus:border-blue-500/40 outline-none transition-all placeholder:text-slate-800" 
                            onKeyDown={(e) => { if (e.key === 'Enter') handleGo(); }} 
                        />
                        {error && <p className="text-red-400 text-[10px] font-bold uppercase tracking-widest">{error}</p>}
                        <button onClick={handleGo} className="w-full bg-[#163d8d] hover:bg-[#1e4eb0] text-white font-black py-6 rounded-2xl shadow-2xl uppercase tracking-[0.2em] text-sm transition-all active:scale-95">
                            Authenticate Session
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#070e24] text-white flex flex-col font-urbanist selection:bg-teal-500/30">
                    <header className="border-b border-white/5 bg-[#0f172a]/40 backdrop-blur-xl sticky top-0 z-50 p-6 no-print">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-14">
                                <BrandLogo />
                                <div>
                                    <h1 className="text-2xl font-lora font-bold uppercase tracking-tight leading-none">UNMASK <span className="text-teal-400 italic lowercase text-xl font-light">diagnostic</span></h1>
                                    <p className="text-[9px] text-white/30 font-black uppercase tracking-[0.4em] mt-2 italic">Ref: {auditId}</p>
                                </div>
                            </div>
                            <div className={`flex items-center gap-3 px-4 py-2 rounded-full border ${isInteractiveMode ? 'bg-orange-500/10 border-orange-500/30' : 'bg-teal-500/5 border-teal-500/10'}`}>
                                <div className={`h-1.5 w-1.5 rounded-full ${isInteractiveMode ? 'bg-orange-400' : 'bg-teal-400 animate-pulse'}`} />
                                <span className={`text-[9px] font-black uppercase tracking-widest ${isInteractiveMode ? 'text-orange-400' : 'text-teal-400'}`}>
                                    {isInteractiveMode ? 'Interactive Sandbox' : 'Certified Audit Sync'}
                                </span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 lg:p-12 grid grid-cols-1 lg:grid-cols-12 gap-12 flex-grow">
                        <div className="lg:col-span-4 glass rounded-[3rem] p-10 shadow-2xl h-fit">
                            <h2 className="text-4xl font-lora italic text-white/90 mb-10 border-b border-white/5 pb-8 tracking-tighter">The Briefing</h2>
                            <div className="space-y-12">
                                <div className="bg-black/20 p-8 rounded-[2.5rem] border border-white/5 shadow-inner">
                                    <span className="text-[10px] font-black text-white/20 uppercase tracking-[0.3em]">Integrity Score</span>
                                    <div className="text-7xl font-black text-white tracking-tighter mb-4 leading-none">
                                        {auditData?.loadPathEfficiency || 68}%
                                    </div>
                                    <p className="text-xs text-white/40 leading-relaxed italic font-lora font-light">Structural integrity based on organizational load-paths.</p>
                                </div>
                                <div className="bg-teal-500/5 p-8 rounded-3xl border border-teal-500/10 text-center">
                                    <p className="text-[10px] font-black text-teal-400 uppercase tracking-widest mb-4">Diagnostic Verdict</p>
                                    <p className="text-2xl font-lora italic text-white/80 leading-snug">
                                        {(auditData?.totalStrainScore || 1) > 3.5 ? 'System Fragmented. Recalibration Required.' : 'Structural Integrity is Stable.'}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8 glass rounded-[3.5rem] p-8 lg:p-16 shadow-2xl relative overflow-hidden">
                            <div className="flex flex-col md:flex-row justify-between mb-24 border-b border-white/5 pb-14">
                                <h2 className="text-6xl font-lora text-white italic tracking-tighter font-medium">Structural Audit</h2>
                                <div className="text-center md:text-right">
                                    <p className="text-[11px] text-white/20 font-black tracking-[0.6em] uppercase mb-2">Aggregate Strain</p>
                                    <div className="text-8xl font-black text-teal-400 tracking-tighter leading-none">
                                        {(auditData?.totalStrainScore || 1.0).toFixed(2)}
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-16">
                                {[
                                    { k: "authorityAlignment", l: "Authority Alignment", s: "Power vs Responsibility gap." },
                                    { k: "operationalSqueeze", l: "Operational Squeeze", s: "Output load vs capacity." },
                                    { k: "maskingDensity", l: "Masking Density", s: "Energy lost to theater." },
                                    { k: "escalationDensity", l: "Escalation Density", s: "Decision path friction." }
                                ].map((f) => (
                                    <div key={f.k}>
                                        <div className="flex justify-between items-end mb-6">
                                            <div>
                                                <h3 className="text-xl font-black uppercase tracking-widest text-white/90 leading-none mb-3">{f.l}</h3>
                                                <p className="text-[11px] font-lora italic text-white/30">{f.sub || f.s}</p>
                                            </div>
                                            <div className="text-5xl font-black text-teal-400 tracking-tighter leading-none">
                                                {(auditData?.[f.key || f.k] || 1.0).toFixed(1)}
                                            </div>
                                        </div>
                                        {isInteractiveMode ? (
                                            <input type="range" min="1" max="5" step="0.1" value={auditData?.[f.k] || 1} onChange={(e) => updateField(f.k, e.target.value)} />
                                        ) : (
                                            <div className="h-3.5 bg-black/40 rounded-full border border-white/5 p-[3px] overflow-hidden shadow-inner">
                                                <div className="h-full bg-gradient-to-r from-teal-600 via-teal-400 to-cyan-400 rounded-full transition-all duration-[2000ms]" style={{ width: `${((auditData?.[f.k] || 1) / 5) * 100}%` }} />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                    
                    {/* FOOTER CTA SECTION */}
                    {isInteractiveMode ? (
                        /* SANDBOX FOOTER: Upsell to Paid Audit */
                        <footer className="bg-slate-900/50 border-t border-white/5 py-16 px-6 text-center no-print">
                            <h3 className="text-3xl font-lora italic text-white mb-4 tracking-tight">Ready to see your team's real numbers?</h3>
                            <p className="text-slate-400 mb-10 max-w-2xl mx-auto text-lg font-light leading-relaxed">
                                You've experimented with the architecture. Now, initiate a 36-point <span className="text-white font-medium italic underline decoration-teal-500/50 underline-offset-4 tracking-tight">Structural Audit</span> to reveal the cold, hard capacity leaks holding your organization back.
                            </p>
                            <a href="https://stan.store/nikkicates" target="_blank" rel="noopener noreferrer" className="inline-block bg-[#163d8d] hover:bg-[#1e4eb0] text-white px-12 py-6 rounded-2xl font-black uppercase tracking-widest text-xs transition-all shadow-[0_20px_40px_-10px_rgba(22,61,141,0.5)] active:scale-95">
                                Unlock the Full Synthesis Engine ($297)
                            </a>
                        </footer>
                    ) : (
                        /* CERTIFIED FOOTER: Next Step Scheduling */
                        <footer className="bg-[#0f172a] border-t border-teal-500/20 py-16 px-6 text-center no-print">
                            <div className="max-w-3xl mx-auto">
                                <h3 className="text-3xl font-lora italic text-white mb-4 tracking-tight">Recalibrate Your Architecture</h3>
                                <p className="text-slate-400 mb-10 text-lg font-light leading-relaxed">
                                    Your data has identified the friction. The next step is a **Recalibration Roadmap** session to dismantle these bottlenecks and reclaim your team's capacity.
                                </p>
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                                    <a href="https://calendar.app.google/s18dHSNbE8tBj1eEA" target="_blank" rel="noopener noreferrer" className="bg-white text-[#064680] px-12 py-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-teal-400 transition-all shadow-2xl flex items-center gap-3 active:scale-95">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                        Schedule Roadmap Session
                                    </a>
                                    <button onClick={() => window.print()} className="text-white/30 hover:text-white font-black uppercase tracking-widest text-[10px] transition-all flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 22 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                        Export System Audit (PDF)
                                    </button>
                                </div>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
